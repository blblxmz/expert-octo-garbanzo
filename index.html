<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>精神图景 · 锚点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 10px;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .header-title {
            font-size: clamp(16px, 3vw, 22px);
            color: #00d9c0;
            font-weight: bold;
        }
        .header-sub {
            font-size: clamp(10px, 1.5vw, 12px);
            color: #888;
        }

        .main-wrap {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .top-function-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .top-function-area {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .full-width {
                grid-column: span 2;
            }
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
        }
        .card-title {
            font-size: clamp(12px, 1.8vw, 14px);
            color: #888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .progress-item {
            margin-bottom: 12px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: clamp(10px, 1.5vw, 12px);
            margin-bottom: 5px;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: #00d9c0;
            border-radius: 3px;
        }
        .sync-value {
            color: #00d9c0;
            font-weight: bold;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .func-btn {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 10px 5px;
            font-size: clamp(10px, 1.5vw, 12px);
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            height: 60px;
            justify-content: center;
            transition: all 0.2s;
            width: 100%;
        }
        .func-btn:hover, .func-btn:active {
            background: #252525;
            border-color: #00d9c0;
        }
        .func-btn.active {
            border-color: #00d9c0;
            color: #00d9c0;
        }
        .func-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .save-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .save-btn {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 8px;
            font-size: clamp(10px, 1.5vw, 12px);
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            width: 100%;
        }
        .save-btn:hover, .save-btn:active {
            border-color: #00d9c0;
        }
        .save-btn.active {
            border-color: #00d9c0;
            color: #00d9c0;
        }

        .content-bottom {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .story-box {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            font-size: clamp(14px, 2vw, 16px);
            line-height: 1.8;
            white-space: pre-line;
            width: 100%;
            font-family: "方正仿宋简体", "FZFS", "Georgia", serif;
        }

        .options-title {
            font-size: clamp(12px, 1.8vw, 14px);
            color: #888;
            margin-bottom: 10px;
            width: 100%;
        }

        .option-item {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: "方正小标宋简体", "FZXBS", "Times New Roman", serif;
        }
        .option-item:hover, .option-item:active {
            background: #252525;
            border-color: #555;
        }
        .option-number {
            color: #888;
            margin-right: 10px;
            flex-shrink: 0;
            font-size: clamp(12px, 1.5vw, 14px);
        }
        .option-text {
            flex: 1;
            font-size: clamp(14px, 1.8vw, 16px);
            word-wrap: break-word;
        }
        .option-sync {
            background: #222;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: clamp(10px, 1.5vw, 12px);
            color: #00d9c0;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .option-sync.mental-cost {
            color: #ff6b6b;
        }
        .option-arrow {
            color: #00d9c0;
            flex-shrink: 0;
            font-size: clamp(12px, 1.5vw, 14px);
        }

        .start-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 20px;
            padding: 10px;
            width: 100%;
        }
        .view-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: clamp(280px, 80%, 400px);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-card:hover, .view-card:active {
            border-color: #00d9c0;
            background: #252525;
        }
        .view-card h2 {
            font-size: clamp(16px, 2vw, 18px);
            margin-bottom: 10px;
        }
        .view-status {
            font-size: clamp(10px, 1.5vw, 12px);
            color: #888;
        }
        .view-status.completed {
            color: #00d9c0;
        }

        .game-page {
            display: none;
            width: 100%;
        }

        #game-tip {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e1e1e;
            border: 1px solid #00d9c0;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: clamp(10px, 1.5vw, 12px);
            color: #00d9c0;
            display: none;
            z-index: 1000;
            max-width: 80%;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            overflow-y: auto;
        }
        .overlay-content {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            max-width: clamp(280px, 80%, 500px);
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .ending-box {
            background: #1e1e1e;
            border: 1px solid #00d9c0;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            color: #00d9c0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="game-tip"></div>

        <div class="header">
            <div class="header-title">精神图景 · 锚点</div>
            <div class="header-sub">SENTINEL-GUIDE SYNCHRONIZATION PROTOCOL V2.4</div>
        </div>

        <!-- 开始页面 -->
        <div id="start-page" class="start-page">
            <div class="view-card" onclick="Game.startView('chengye')">
                <h2>程野 · 临海之森</h2>
                <div id="chengye-status" class="view-status">未探索</div>
            </div>
            <div class="view-card" onclick="Game.startView('jiangyanbai')">
                <h2>江砚白 · 钢铁森林</h2>
                <div id="jiangyanbai-status" class="view-status">未探索</div>
            </div>
        </div>

        <!-- 游戏主页面 -->
        <div id="game-page" class="game-page">
            <div class="main-wrap">
                <!-- 顶部功能区域 -->
                <div class="top-function-area">
                    <div class="card">
                        <div class="card-title">生理指标监控</div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>同步率</span>
                                <span class="sync-value" id="sync-value">50%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="sync-progress" style="width: 50%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>探索度</span>
                                <span id="explore-value">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="explore-progress" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">物证与卷宗收集</div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>记忆碎片</span>
                                <span id="frag-text">0 / 15</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="frag-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>特殊物品</span>
                                <span id="item-text">0 / 6</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="item-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="progress-item">
                            <div class="progress-label">
                                <span>结局收集</span>
                                <span id="end-text">0 / 10</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-inner" id="end-progress" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card full-width">
                        <div class="card-title">功能操作</div>
                        <div class="btn-grid">
                            <button class="func-btn" onclick="UI.toggleFastForward()" id="fast-forward-btn">
                                <svg viewBox="0 0 24 24"><path d="M13 2.05v3.02c3.95.49 7 3.85 7 7.93 0 .67-.08 1.33-.24 1.96l2.95 2.95C23.62 16.66 24 14.88 24 13c0-6.18-5-11-11-11-1.84 0-3.59.31-5.15.88l2.95 2.95C11.68 4.23 12.33 4.13 13 2.05zm-2.5.69L2.05 3.05l1.41 1.41C2.19 5.16 1 7.96 1 13c0 6.18 5 11 11 11 5.04 0 7.84-1.19 8.55-2.48l1.41 1.41L21.95 21l-9.44-9.44-2.01 2.01c.56 1.18.44 2.58-.31 3.54-.89.99-2.4.99-3.29 0-.99-.89-.99-2.4 0-3.29.77-.77 1.98-.89 2.95-.31l2.01-2.01L5.11 2.74z"/></svg>
                                快进
                            </button>
                            <button class="func-btn" onclick="Game.replayNode()">
                                <svg viewBox="0 0 24 24"><path d="M13.5 3C8.04 3 3.27 6.96 1.64 12H0l2.5 2.5L5 12H3.36C5.08 7.03 9.43 3.5 14.5 3.5c4.34 0 8.04 2.84 9.27 6.68C24.61 9.5 25 11.16 25 13c0 3.31-2.69 6-6 6-1.79 0-3.4-.88-4.43-2.24L9.87 18c1.52 2.03 3.96 3.34 6.63 3.34 4.42 0 8-3.58 8-8 0-4.42-3.58-8-8-8-1.5 0-2.9.41-4.13 1.11L13.5 3z"/></svg>
                                重播
                            </button>
                            <button class="func-btn" onclick="UI.toggleBgm()" id="music-btn">
                                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                                音乐
                            </button>
                            <button class="func-btn" onclick="UI.showTimeLine()">
                                <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                                回溯
                            </button>
                        </div>

                        <div class="card-title" style="margin-top: 15px;">存档管理</div>
                        <div class="save-grid">
                            <button class="save-btn" id="save-btn-0" onclick="Save.saveGame(0)">存档1</button>
                            <button class="save-btn" id="save-btn-1" onclick="Save.saveGame(1)">存档2</button>
                            <button class="save-btn" id="save-btn-2" onclick="Save.saveGame(2)">存档3</button>
                            <button class="save-btn" id="save-btn-3" onclick="Save.saveGame(3)">存档4</button>
                            <button class="save-btn" id="save-btn-4" onclick="Save.saveGame(4)">存档5</button>
                        </div>
                        <div class="save-grid">
                            <button class="save-btn" id="load-btn-0" onclick="Save.loadGame(0)">读档1</button>
                            <button class="save-btn" id="load-btn-1" onclick="Save.loadGame(1)">读档2</button>
                            <button class="save-btn" id="load-btn-2" onclick="Save.loadGame(2)">读档3</button>
                            <button class="save-btn" id="load-btn-3" onclick="Save.loadGame(3)">读档4</button>
                            <button class="save-btn" id="load-btn-4" onclick="Save.loadGame(4)">读档5</button>
                        </div>

                        <button class="func-btn" onclick="Game.backToStart()" style="width: 100%; margin-top: 10px;">
                            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                            返回首页
                        </button>
                    </div>
                </div>

                <!-- 底部文字和选项 -->
                <div class="content-bottom">
                    <div class="story-box" id="narrate-text">
                        【请选择视角开始探索】
                    </div>

                    <div class="options-title">> 请选择行动方案</div>
                    <div id="options-area"></div>
                </div>
            </div>
        </div>

        <!-- 时间线弹窗 -->
        <div class="overlay" id="time-line-page">
            <div class="overlay-content">
                <div class="card-title" style="color:#00d9c0; text-align:center; font-size:16px;">已访问节点（点击回溯）</div>
                <button class="save-btn" onclick="UI.hideTimeLine()" style="width:100%; margin-bottom:15px;">关闭</button>
                <div id="time-line-content"></div>
            </div>
        </div>

        <!-- 结局弹窗 - 移除图片，改为纯文字 -->
        <div class="overlay" id="ending-page">
            <div class="overlay-content">
                <div class="card-title" id="ending-name" style="color:#00d9c0; text-align:center; font-size:16px;">结局</div>
                <div class="ending-box" id="ending-desc"></div>
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
                    <button class="save-btn" onclick="UI.hideEnding()">关闭</button>
                    <button class="save-btn" onclick="Game.replayEndingLine()">重玩此线</button>
                    <button class="save-btn" onclick="Game.backToStart()">返回首页</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/game.js"></script>
    <script src="js/save.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
